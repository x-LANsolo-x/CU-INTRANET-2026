<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Admin Dashboard</title>
    <script>
        const expectedPwd = "oaa2627";
        let storedPwd = sessionStorage.getItem("adminAuth");
        if (storedPwd !== expectedPwd) {
            let userPwd = prompt("Enter Admin Password to continue:");
            if (userPwd === expectedPwd) {
                sessionStorage.setItem("adminAuth", expectedPwd);
            } else {
                alert("Incorrect Password.");
                document.documentElement.innerHTML = "<h2 style='text-align:center; padding-top: 50px; font-family: sans-serif;'>Unauthorized Access.</h2>";
                window.stop();
            }
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .logo-preview { max-height: 50px; max-width: 50px; object-fit: contain; }
        .modal-body img { max-width: 100%; height: auto; }
        .media-preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .media-preview { width: 120px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
        
        .media-item-wrapper { position: relative; display: inline-block; }
        .media-item-wrapper .media-actions {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.6); display: flex; justify-content: space-between;
            padding: 2px; opacity: 0; transition: opacity 0.2s;
        }
        .media-item-wrapper:hover .media-actions { opacity: 1; }
        .media-actions button { background: none; border: none; color: white; padding: 2px 5px; font-size: 12px; }
        .media-actions button:hover { color: #ddd; }
        .media-actions .delete-btn { color: #ff4d4d; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Club Admin Dashboard</span>
        <button class="btn btn-success" onclick="openAddModal()">+ Add New Club</button>
    </div>
</nav>

<div class="container mt-4">
    <div id="alertContainer"></div>

    <div class="row mb-3">
        <div class="col-md-8">
            <input type="text" id="searchInput" class="form-control" placeholder="Search clubs by name or faculty..." oninput="filterClubs()">
        </div>
        <div class="col-md-4">
            <select id="filterCategory" class="form-select" onchange="filterClubs()">
                <option value="ALL">All Categories</option>
                <option value="Science, Technology & Innovation">Science, Technology & Innovation</option>
                <option value="Media, Culture & Communication">Media, Culture & Communication</option>
                <option value="Social Impact & Community Development & Community Development">Social Impact & Community Development & Community Development</option>
                <option value="Business & Management">Business & Management</option>
            </select>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Logo</th>
                        <th>Club Name</th>
                        <th>Category</th>
                        <th>Faculty</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="clubsTableBody">
                    <!-- Loaded dynamically via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit/Add Modal -->
<div class="modal fade" id="clubModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title" id="clubModalLabel">Edit Club</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="clubForm">
                    <input type="hidden" id="clubId">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Club Title</label>
                            <input type="text" class="form-control" id="clubTitle" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Parent Category</label>
                            <select class="form-control" id="clubCategory">
                                <option value="Science, Technology & Innovation">Science, Technology & Innovation</option>
                                <option value="Media, Culture & Communication">Media, Culture & Communication</option>
                                <option value="Social Impact & Community Development & Community Development">Social Impact & Community Development & Community Development</option>
                                <option value="Business & Management">Business & Management</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sub-Categories (comma separated)</label>
                        <input type="text" class="form-control" id="clubCategories">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Short Description</label>
                        <textarea class="form-control" id="clubShortDesc" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Long Description</label>
                        <textarea class="form-control" id="clubLongDesc" rows="4"></textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Faculty Coordinator</label>
                            <input type="text" class="form-control" id="clubFaculty">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contact Email</label>
                            <input type="email" class="form-control" id="clubContact">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Members Count</label>
                            <input type="text" class="form-control" id="clubMembers">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Owner/Department</label>
                            <input type="text" class="form-control" id="clubOwner">
                        </div>
                    </div>

                    <hr>
                    
                    <!-- Media Uploads -->
                    <div class="mb-3">
                        <label class="form-label">Logo Upload</label>
                        <div class="input-group">
                            <input type="file" class="form-control" id="logoUpload" accept="image/*">
                            <button class="btn btn-outline-secondary" type="button" onclick="uploadLogo()">Upload Logo</button>
                        </div>
                        <input type="hidden" id="clubLogoPath">
                        <div class="mt-2" id="logoPreviewContainer"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gallery Media Upload (Multiple)</label>
                        <div class="input-group">
                            <input type="file" class="form-control" id="mediaUpload" accept="image/*,video/*" multiple>
                            <button class="btn btn-outline-secondary" type="button" onclick="uploadMedia()">Upload Media</button>
                        </div>
                        <input type="hidden" id="clubMediaPaths">
                        <div class="mt-2 mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="hideMediaColumn">
                            <label class="form-check-label" for="hideMediaColumn">Hide Media Carousel on Portal (Text-only layout)</label>
                        </div>
                        <div class="media-preview-container" id="mediaPreviewContainer"></div>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger me-auto" id="deleteBtn" onclick="deleteCurrentClub()">Delete Club</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveClub()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin/app.js"></script>
<script src="system.js?v=7.0"></script>
</body>
</html>
